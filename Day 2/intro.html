<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Giới thiệu bản thân</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/themes/prism-okaidia.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #488ccc, #f0d0ff);
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 200px auto;
      background-color: rgba(255,255,255,0.9);
      border-radius: 15px;
      padding: 40px;
      display: flex;
      gap: 30px;
      align-items: center;
    }
    .profile-pic img {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .info {
      flex: 1;
    }

    .info h1 {
      margin-top: 10px;
      font-size: 3em;
      color: #582fb6;
    }

    .info h3 {
      margin: 5px 0 20px 0;
      font-weight: normal;
      color: #5a1a9c;
    }

    .section-title {
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 50px;
      color: #5a1a9c;
    }

    .socials a {
      text-decoration: none;
      color: #5a1a9c;
      margin-right: 10px;
      font-size: 1.5em;
    }

    .socials a:hover {
      color: #333;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="profile-pic">
      <img src="https://i.imgur.com/Y1QLSlU.jpg" 
      alt="Profile Picture" 
      style="width: 250px; height: 250px; border-radius: 50%; object-fit: cover;">
    </div>
    <div class="info">
      <h1>Đoàn Phi Long</h1>
      <h3>Du học sinh Nhật Bản</h3>

      <p><span class="section-title">Giới thiệu bản thân:</span> Tôi là Đoàn Phi Long, một du học sinh đến từ Việt Nam, hiện đang theo học tại Nhật Bản.</p>

      <p><span class="section-title">Học vấn:</span> Đang theo học trường chuyên ngành IT tại Fukuoka, Nhật Bản. </p>

      <p><span class="section-title">Mục tiêu:</span> Thành thạo các ngôn ngữ lập trình </p>

      <div class="socials">
        <a href="https://www.facebook.com/reel/?locale=ja_JP"><i class="fab fa-facebook">Facebook</i></a>
        <a href="https://www.instagram.com/l.doanphi?igsh=MTI3cnlodGlvMXF6MA%3D%3D&utm_source=qr"><i class="fab fa-instagram">Instagram</i></a>
        <a href="tel:09038262407"><i class="fas fa-phone">Phone</i></a>
      </div>
    </div>
  </div>

</body>
</html>
